limit_req_zone $binary_remote_addr zone=rivers_login:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name anrivers.com www.anrivers.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://anrivers.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.anrivers.com;

    ssl_certificate /etc/letsencrypt/live/anrivers.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anrivers.com/privkey.pem;

    return 301 https://anrivers.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name anrivers.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/anrivers.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anrivers.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 25m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /admin/login {
        limit_req zone=rivers_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/rivers-proxy.conf;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/rivers-proxy.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/rivers-proxy.conf;
    }
}
