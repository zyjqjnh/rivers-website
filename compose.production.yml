name: rivers-website

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: rivers-website-app:latest
    restart: unless-stopped
    init: true
    env_file:
      - ${RIVERS_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ${RIVERS_ENV_FILE:-.env.production}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env.production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env.production}
    volumes:
      - rivers_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  migrate:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    image: rivers-website-migrator:latest
    env_file:
      - ${RIVERS_ENV_FILE:-.env.production}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npx", "prisma", "migrate", "deploy"]

  seed:
    profiles: ["tools"]
    image: rivers-website-migrator:latest
    env_file:
      - ${RIVERS_ENV_FILE:-.env.production}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "db:seed"]

volumes:
  rivers_postgres_data:
